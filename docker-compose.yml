version: '3.8'

services:
  welcome-bot:
    build: .
    container_name: welcome-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      # Optional: persist logs
      - ./logs:/app/logs

